<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="QuantProof: measure quantized models on your own task">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1220"/>
      <stop offset="1" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="pick" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2dd4a7"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="12" fill="none" stroke="#2a3550" stroke-width="1"/>

  <!-- quant sweep motif: quality bars per quant, smallest passing quant highlighted -->
  <g transform="translate(790,70)">
    <g fill="#2e3b5c">
      <rect x="0"   y="8"  width="44" height="172" rx="4"/>
      <rect x="62"  y="14" width="44" height="166" rx="4"/>
      <rect x="124" y="18" width="44" height="162" rx="4"/>
      <rect x="248" y="92" width="44" height="88"  rx="4"/>
      <rect x="310" y="136" width="44" height="44" rx="4"/>
    </g>
    <rect x="186" y="26" width="44" height="154" rx="4" fill="url(#pick)"/>
    <line x1="-12" y1="34" x2="366" y2="34" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="5 6" opacity="0.55"/>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#8494b8" text-anchor="middle">
      <text x="22"  y="204">Q8</text>
      <text x="84"  y="204">Q6_K</text>
      <text x="146" y="204">Q5_K_M</text>
      <text x="208" y="204" fill="#5eead4" font-weight="bold">Q4_K_M</text>
      <text x="270" y="204">Q3_K_M</text>
      <text x="332" y="204">Q2_K</text>
    </g>
    <text x="366" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#5eead4" text-anchor="end" opacity="0.8">within 2% of best</text>
  </g>

  <g transform="translate(70,0)">
    <text x="0" y="122" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="56" font-weight="bold" fill="#e9eef8">Quant<tspan fill="#5eead4">Proof</tspan></text>
    <text x="0" y="168" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" fill="#aab6d0">Which quant holds up on your task, on your hardware.</text>
    <text x="0" y="198" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="21" fill="#aab6d0">Measured quality, latency, and peak VRAM. Not estimates.</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
      <text x="0" y="252" fill="#64748f">$</text>
      <text x="18" y="252" fill="#c9d4e8">quantproof run --pack my-task</text>
    </g>
  </g>
</svg>
